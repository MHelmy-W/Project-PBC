<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Hewan</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
<div class="logo">
<div class="logo-circle">A</div>
<div>
<h2>Atlas Hewan</h2>
<p>Digital Histology</p>
</div>
</div>

<input type="text" placeholder="Cari preparat...">

<div class="menu">
<button class="menu-btn" onclick="loadData('testis')">Testis Tikus</button>
<button class="menu-btn" onclick="loadData('ovarium')">Ovarium Katak</button>
<button class="menu-btn" onclick="loadData('embrio')">Embrio Ayam</button>
</div>
</div>

<div class="main">
<div class="hero">
<div>
<h1 id="title">Atlas Struktur & Perkembangan Hewan</h1>
<p id="subtitle">Pilih preparat untuk mulai eksplorasi</p>
</div>
<button class="upload-btn">Upload Gambar</button>
</div>

<div class="content-grid">

<div class="viewer-card">
<div class="viewer-toolbar">
<span>🔬 Viewer</span>
<div>
<button onclick="zoomIn()">+</button>
<button onclick="zoomOut()">−</button>
</div>
</div>

<div class="viewer">
<img id="mainImage" src="https://via.placeholder.com/900x600">
<div id="markers"></div>
</div>
</div>

<div class="info-panel">
<div class="card">
<h3>Deskripsi</h3>
<p id="description">Website atlas digital modern.</p>
</div>

<div class="card">
<h3>Struktur</h3>
<ul id="structureList"></ul>
</div>

<div class="card">
<h3>Quiz Mini</h3>
<p>Bagian penghasil sperma?</p>
<button class="quiz-btn">Tubulus Seminiferus</button>
<button class="quiz-btn">Folikel</button>
</div>
</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
