<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas Struktur & Perkembangan Hewan</title>
  <style>
    :root {
      --green-primary: #00aa13;
      --green-dark: #00880c;
      --green-light: #e6f9e8;
      --gray-100: #f7f7f7;
      --gray-200: #eaeaea;
      --gray-600: #666;
      --gray-900: #1a1a1a;
      --sidebar-width: 300px;
      --radius: 12px;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--gray-100);
      color: var(--gray-900);
      line-height: 1.6;
    }
    .app { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      position: fixed; top: 0; left: 0; width: var(--sidebar-width);
      height: 100vh; background: white; border-right: 1px solid var(--gray-200);
      box-shadow: var(--shadow); display: flex; flex-direction: column;
      z-index: 100; overflow-y: auto; transition: transform 0.3s ease;
    }
    .sidebar-header {
      padding: 1.5rem 1rem;
      background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
      color: white;
    }
    .sidebar-header h2 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    .sidebar-header p { font-size: 0.85rem; opacity: 0.9; }
    .search-container { padding: 0.75rem 1rem; }
    .search-input {
      width: 100%; padding: 0.6rem 0.8rem; border: 2px solid var(--gray-200);
      border-radius: 8px; font-size: 0.9rem; transition: border 0.2s;
      background: var(--gray-100);
    }
    .search-input:focus { outline: none; border-color: var(--green-primary); background: white; }
    .sidebar-nav { flex: 1; padding: 0.5rem; overflow-y: auto; }
    .specimen-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem; margin-bottom: 0.25rem; border-radius: var(--radius);
      cursor: pointer; transition: all 0.2s; text-decoration: none; color: var(--gray-900);
    }
    .specimen-item:hover { background: var(--green-light); }
    .specimen-item.active { background: var(--green-primary); color: white; }
    .specimen-item.active small { color: rgba(255,255,255,0.8); }
    .specimen-item small { display: block; font-size: 0.8rem; color: var(--gray-600); }
    .specimen-icon { font-size: 1.3rem; }
    .no-results { padding: 2rem 1rem; text-align: center; color: var(--gray-600); }

    /* Toggle button */
    .sidebar-toggle {
      display: none; position: fixed; top: 1rem; left: 1rem;
      z-index: 110; background: var(--green-primary); border: none;
      width: 44px; height: 44px; border-radius: 50%; box-shadow: var(--shadow);
      cursor: pointer; align-items: center; justify-content: center;
    }
    .hamburger { width: 20px; height: 2px; background: white; position: relative; }
    .hamburger::before, .hamburger::after {
      content: ''; position: absolute; width: 20px; height: 2px;
      background: white; left: 0; transition: transform 0.3s;
    }
    .hamburger::before { top: -6px; }
    .hamburger::after { top: 6px; }

    /* Main content */
    .main-content {
      flex: 1; margin-left: var(--sidebar-width); padding: 2rem;
      background: white; min-height: 100vh; transition: margin-left 0.3s ease;
    }
    .detail-container { max-width: 900px; margin: 0 auto; }
    .specimen-title { font-size: 2rem; color: var(--green-dark); margin-bottom: 0.25rem; }
    .specimen-category { font-size: 1rem; color: var(--gray-600); margin-bottom: 1.5rem; }
    .specimen-image-wrapper {
      background: var(--gray-100); border-radius: var(--radius);
      overflow: hidden; margin-bottom: 2rem; box-shadow: var(--shadow);
    }
    .specimen-image { width: 100%; height: auto; display: block; object-fit: cover; max-height: 500px; }
    .description-box {
      background: var(--green-light); padding: 1.5rem;
      border-radius: var(--radius); margin-bottom: 2rem;
      border-left: 4px solid var(--green-primary);
    }
    .description-box h2 { font-size: 1.3rem; margin-bottom: 0.5rem; color: var(--green-dark); }
    .labels-section h2 { font-size: 1.3rem; margin-bottom: 1rem; color: var(--green-dark); }
    .label-item {
      background: var(--gray-100); padding: 1rem;
      border-radius: var(--radius); margin-bottom: 0.75rem;
    }
    .label-item h3 { font-size: 1rem; font-weight: 600; color: var(--green-primary); margin-bottom: 0.25rem; }
    .label-item p { font-size: 0.95rem; color: var(--gray-600); }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--gray-600); font-size: 1.2rem; }

    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-toggle { display: flex; }
      .main-content { margin-left: 0; padding-top: calc(60px + 1rem); }
    }
  </style>
</head>
<body>
<div class="app">
  <!-- Toggle -->
  <button class="sidebar-toggle" id="sidebarToggle">
    <span class="hamburger"></span>
  </button>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>🧬 Atlas Hewan</h2>
      <p>Struktur & Perkembangan</p>
    </div>
    <div class="search-container">
      <input type="text" class="search-input" id="searchInput" placeholder="Cari spesimen...">
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

  <!-- Main -->
  <main class="main-content" id="mainContent"></main>
</div>

<script>
  // ======================= DATA =======================
  const specimens = [
    {
      id: "ikan-mas-jantan",
      name: "Ikan Mas Jantan",
      category: "Ikan Mas",
      sex: "Jantan",
      image: "https://placehold.co/800x500/e6f9e8/00880c?text=Ikan+Mas+Jantan",
      description: "Ikan mas jantan memiliki tubuh ramping, sirip lebih panjang, dan papila genital berbentuk segitiga. Insang, sirip punggung, dan gurat sisi terlihat jelas.",
      labels: [
        { name: "Operculum (Tutup Insang)", description: "Melindungi insang, tampak keras dan berwarna keperakan." },
        { name: "Sirip Punggung", description: "Berfungsi menjaga keseimbangan, berjari-jari keras di depan." },
        { name: "Gurat Sisi", description: "Garis sensoris mendeteksi getaran air." },
        { name: "Papila Genital", description: "Berbentuk segitiga memanjang, ciri jantan." }
      ]
    },
    {
      id: "ikan-mas-betina",
      name: "Ikan Mas Betina",
      category: "Ikan Mas",
      sex: "Betina",
      image: "https://placehold.co/800x500/e6f9e8/00880c?text=Ikan+Mas+Betina",
      description: "Ikan mas betina memiliki tubuh lebih gemuk, sirip relatif pendek, dan papila genital bulat.",
      labels: [
        { name: "Operculum", description: "Tutup insang halus, sedikit lebih lebar." },
        { name: "Sirip Perut", description: "Lebih pendek dan membulat." },
        { name: "Papila Genital", description: "Berbentuk bulat, ciri betina." },
        { name: "Sisik", description: "Tipe sikloid, licin dan mengkilap." }
      ]
    },
    {
      id: "katak-jantan",
      name: "Katak Jantan",
      category: "Katak",
      sex: "Jantan",
      image: "https://placehold.co/800x500/e6f9e8/00880c?text=Katak+Jantan",
      description: "Katak jantan memiliki kantong suara di bawah mulut, bantalan kawin di jari depan.",
      labels: [
        { name: "Kantong Suara", description: "Memperkeras suara panggilan kawin." },
        { name: "Bantalan Kawin", description: "Penebalan di jari pertama untuk ampleksus." },
        { name: "Tympanum", description: "Membran pendengaran di belakang mata." },
        { name: "Paru-paru", description: "Sederhana, seperti balon tipis." }
      ]
    },
    {
      id: "katak-betina",
      name: "Katak Betina",
      category: "Katak",
      sex: "Betina",
      image: "https://placehold.co/800x500/e6f9e8/00880c?text=Katak+Betina",
      description: "Katak betina lebih besar, tanpa kantong suara, ovarium berkembang saat musim kawin.",
      labels: [
        { name: "Ovarium", description: "Mengandung banyak telur, berbutir." },
        { name: "Tympanum", description: "Lebih kecil dari jantan." },
        { name: "Kloaka", description: "Lubang ekskresi dan reproduksi." },
        { name: "Jantung", description: "Tiga ruang." }
      ]
    },
    {
      id: "kadal-jantan",
      name: "Kadal Jantan",
      category: "Kadal",
      sex: "Jantan",
      image: "https://placehold.co/800x500/e6f9e8/00880c?text=Kadal+Jantan",
      description: "Kadal jantan memiliki pori femoralis besar, kepala lebar, hemipenis di pangkal ekor.",
      labels: [
        { name: "Pori Femoralis", description: "Mengeluarkan feromon." },
        { name: "Hemipenis", description: "Organ kopulasi ganda." },
        { name: "Sisik Dorsal", description: "Kasar, pelindung." },
        { name: "Mata", description: "Kelopak mata bergerak." }
      ]
    },
    {
      id: "kadal-betina",
      name: "Kadal Betina",
      category: "Kadal",
      sex: "Betina",
      image: "https://placehold.co/800x500/e6f9e8/00880c?text=Kadal+Betina",
      description: "Kadal betina pori femoralis redup, tubuh ramping, oviduk berkembang.",
      labels: [
        { name: "Oviduk", description: "Saluran telur bergelung." },
        { name: "Pori Femoralis", description: "Sangat redup." },
        { name: "Ekor", description: "Autotomi." },
        { name: "Lidah Bercabang", description: "Organ Jacobson." }
      ]
    },
    {
      id: "marmut-jantan",
      name: "Marmut Jantan",
      category: "Marmut",
      sex: "Jantan",
      image: "https://placehold.co/800x500/e6f9e8/00880c?text=Marmut+Jantan",
      description: "Marmut jantan testis jelas, kelenjar bau di area anogenital.",
      labels: [
        { name: "Testis", description: "Sepasang di skrotum." },
        { name: "Kelenjar Bau", description: "Menandai wilayah." },
        { name: "Gigi Seri", description: "Tumbuh terus, oranye." },
        { name: "Sekum", description: "Usus buntu besar." }
      ]
    },
    {
      id: "marmut-betina",
      name: "Marmut Betina",
      category: "Marmut",
      sex: "Betina",
      image: "https://placehold.co/800x500/e6f9e8/00880c?text=Marmut+Betina",
      description: "Marmut betina uterus bicornis, dua tanduk rahim, kelenjar susu jelas.",
      labels: [
        { name: "Uterus Bicornis", description: "Rahim bertanduk dua." },
        { name: "Ovarium", description: "Kecil, dekat ginjal." },
        { name: "Kelenjar Susu", description: "Di area inguinal." },
        { name: "Ginjal", description: "Berbentuk kacang." }
      ]
    },
    {
      id: "burung-dara-jantan",
      name: "Burung Dara Jantan",
      category: "Burung Dara",
      sex: "Jantan",
      image: "https://placehold.co/800x500/e6f9e8/00880c?text=Burung+Dara+Jantan",
      description: "Burung dara jantan bulu cerah, testis internal, kloaka menonjol saat kawin.",
      labels: [
        { name: "Testis", description: "Dekat ginjal." },
        { name: "Syrinx", description: "Organ suara." },
        { name: "Tembolok", description: "Simpan makanan." },
        { name: "Bulu Primer", description: "Untuk terbang." }
      ]
    },
    {
      id: "burung-dara-betina",
      name: "Burung Dara Betina",
      category: "Burung Dara",
      sex: "Betina",
      image: "https://placehold.co/800x500/e6f9e8/00880c?text=Burung+Dara+Betina",
      description: "Burung dara betina ovarium kiri saja, bulu kusam, tulang pubis lebar.",
      labels: [
        { name: "Ovarium Kiri", description: "Satu-satunya fungsional." },
        { name: "Oviduk", description: "Pembentuk cangkang telur." },
        { name: "Tulang Pubis", description: "Lebar untuk bertelur." },
        { name: "Gizzard", description: "Lambung otot." }
      ]
    }
  ];

  // ======================= LOGIC =======================
  let currentSpecimenId = specimens[0].id;
  const sidebar = document.getElementById('sidebar');
  const sidebarToggle = document.getElementById('sidebarToggle');
  const searchInput = document.getElementById('searchInput');
  const sidebarNav = document.getElementById('sidebarNav');
  const mainContent = document.getElementById('mainContent');

  // Render sidebar list
  function renderSidebar(filterText = '') {
    const filtered = specimens.filter(s =>
      s.name.toLowerCase().includes(filterText) ||
      s.category.toLowerCase().includes(filterText) ||
      s.sex.toLowerCase().includes(filterText)
    );
    sidebarNav.innerHTML = '';
    if (filtered.length === 0) {
      sidebarNav.innerHTML = '<p class="no-results">Tidak ada spesimen ditemukan.</p>';
      return;
    }
    filtered.forEach(s => {
      const div = document.createElement('div');
      div.className = `specimen-item ${s.id === currentSpecimenId ? 'active' : ''}`;
      div.innerHTML = `
        <span class="specimen-icon">${s.sex === 'Jantan' ? '♂️' : '♀️'}</span>
        <div>
          <strong>${s.name}</strong>
          <small>${s.category}</small>
        </div>
      `;
      div.addEventListener('click', () => {
        currentSpecimenId = s.id;
        renderDetail();
        renderSidebar(searchInput.value.toLowerCase().trim());
        // Close sidebar on mobile after selection
        if (window.innerWidth <= 1024) {
          sidebar.classList.remove('open');
        }
      });
      sidebarNav.appendChild(div);
    });
  }

  // Render detail content
  function renderDetail() {
    const specimen = specimens.find(s => s.id === currentSpecimenId);
    if (!specimen) {
      mainContent.innerHTML = '<div class="empty-state">Spesimen tidak ditemukan.</div>';
      return;
    }
    let labelsHTML = '';
    specimen.labels.forEach(l => {
      labelsHTML += `
        <div class="label-item">
          <h3>${l.name}</h3>
          <p>${l.description}</p>
        </div>
      `;
    });
    mainContent.innerHTML = `
      <div class="detail-container">
        <h1 class="specimen-title">${specimen.name}</h1>
        <p class="specimen-category">${specimen.category} – ${specimen.sex}</p>
        <div class="specimen-image-wrapper">
          <img src="${specimen.image}" alt="${specimen.name}" class="specimen-image"
               onerror="this.onerror=null;this.src='https://placehold.co/800x500/e6f9e8/00880c?text=Atlas+Hewan';">
        </div>
        <div class="description-box">
          <h2>Deskripsi Umum</h2>
          <p>${specimen.description}</p>
        </div>
        <div class="labels-section">
          <h2>Struktur Anatomi & Keterangan</h2>
          ${labelsHTML}
        </div>
      </div>
    `;
  }

  // Toggle sidebar mobile
  sidebarToggle.addEventListener('click', () => {
    sidebar.classList.toggle('open');
  });

  // Search event
  searchInput.addEventListener('input', (e) => {
    renderSidebar(e.target.value.toLowerCase().trim());
  });

  // Init
  renderSidebar();
  renderDetail();

  // Responsive helper: close sidebar if window resizes to desktop
  window.addEventListener('resize', () => {
    if (window.innerWidth > 1024) {
      sidebar.classList.remove('open');
    }
  });
</script>
</body>
</html>
